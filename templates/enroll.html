<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll User - Smart Locker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .camera-container { position: relative; width: 100%; max-width: 640px; margin: 0 auto; }
        .camera-container video { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #capturedImages img { height: 80px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">📝 Enroll New User</h4>
                </div>
                <div class="card-body">
                    <form id="enrollmentForm">
                        <!-- User Name Input -->
                        <div class="mb-3">
                            <label for="userName" class="form-label">User Name</label>
                            <input type="text" class="form-control" id="userName" placeholder="Enter full name" required>
                        </div>

                        <!-- RFID Scan Section -->
                        <div class="mb-3">
                            <label class="form-label">RFID Card UID</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="rfidUid" placeholder="Click button and scan card" readonly required>
                                <button type="button" class="btn btn-info text-white" id="scanRfidBtn">Scan RFID</button>
                            </div>
                            <div id="rfidStatus" class="form-text text-muted">Click "Scan RFID" and present your card to the reader.</div>
                        </div>

                        <hr>

                        <!-- Camera Section -->
                        <div class="mb-3">
                            <label class="form-label">Face Images (Minimum 3 required)</label>
                            <div class="camera-container mb-2">
                                <video id="video" width="640" height="480" autoplay></video>
                                <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
                            </div>
                            <div class="d-flex gap-2 mt-2">
                                <button type="button" class="btn btn-outline-primary" id="startCamera">Start Camera</button>
                                <button type="button" class="btn btn-success" id="capture" disabled>Capture 1 Image</button>
                                <button type="button" class="btn btn-warning text-white" id="captureMultiple" disabled>Auto-Capture 5 Images</button>
                            </div>
                        </div>

                        <!-- Captured Images Preview -->
                        <div class="mb-3">
                            <label class="form-label">Captured Frames</label>
                            <div id="capturedImages" class="d-flex flex-wrap gap-2 border rounded p-2 bg-light" style="min-height: 100px;">
                                <span class="text-muted align-self-center" id="noImagesText">No images captured yet.</span>
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg" id="enrollBtn" disabled>Enroll User</button>
                            <a href="/" class="btn btn-link mt-2 text-danger" id="cancelBtn">Cancel Enrollment</a>
                        </div>
                    </form>

                    <!-- Status Messages -->
                    <div id="status" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let stream = null;
    let capturedImages = [];
    let imageCount = 0;
    let rfidPolling = false;

    document.addEventListener('DOMContentLoaded', function() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startCameraBtn = document.getElementById('startCamera');
        const captureBtn = document.getElementById('capture');
        const captureMultipleBtn = document.getElementById('captureMultiple');
        const enrollBtn = document.getElementById('enrollBtn');
        const capturedImagesDiv = document.getElementById('capturedImages');
        const noImagesText = document.getElementById('noImagesText');
        const statusDiv = document.getElementById('status');
        const scanRfidBtn = document.getElementById('scanRfidBtn');
        const rfidUidInput = document.getElementById('rfidUid');
        const rfidStatus = document.getElementById('rfidStatus');
        const cancelBtn = document.getElementById('cancelBtn');

        // Handle Cancel button
        cancelBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            await fetch('/api/enrollment/cancel', { method: 'POST' });
            window.location.href = "/";
        });

        // Handle RFID Scan button
        scanRfidBtn.addEventListener('click', async function() {
            scanRfidBtn.disabled = true;
            rfidStatus.innerText = "Waiting for card... Please scan on ESP32.";
            rfidStatus.className = "form-text text-primary";
            rfidPolling = true;
            
            // Start polling Flask for the UID
            const pollInterval = setInterval(async () => {
                if (!rfidPolling) {
                    clearInterval(pollInterval);
                    return;
                }
                
                try {
                    const res = await fetch('/api/enrollment/scan_rfid');
                    const data = await res.json();
                    
                    if (data.success && data.uid) {
                        rfidUidInput.value = data.uid;
                        rfidStatus.innerText = "RFID UID captured successfully!";
                        rfidStatus.className = "form-text text-success";
                        rfidPolling = false;
                        clearInterval(pollInterval);
                        scanRfidBtn.disabled = false;
                        checkFormCompletion();
                    }
                } catch (e) {
                    console.error("Polling error:", e);
                }
            }, 1000); // Poll every 1 second
        });

        // Start camera
        startCameraBtn.addEventListener('click', async function() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                captureBtn.disabled = false;
                captureMultipleBtn.disabled = false;
                startCameraBtn.disabled = true;
                showStatus('Camera started successfully', 'success');
            } catch (err) {
                showStatus('Error accessing camera: ' + err.message, 'danger');
            }
        });
        
        // Capture single image
        captureBtn.addEventListener('click', function() {
            captureImage();
        });
        
        // Capture multiple images
        captureMultipleBtn.addEventListener('click', async function() {
            captureMultipleBtn.disabled = true;
            captureBtn.disabled = true;
            showStatus('Capturing 5 images... Please hold still.', 'info');
            
            for (let i = 0; i < 5; i++) {
                await new Promise(resolve => setTimeout(resolve, 1000));
                captureImage();
                showStatus(`Capturing image ${i + 1} of 5...`, 'info');
            }
            
            captureMultipleBtn.disabled = false;
            captureBtn.disabled = false;
            showStatus('All 5 images captured!', 'success');
            setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
        });
        
        function captureImage() {
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 640, 480);
            
            const imageData = canvas.toDataURL('image/jpeg');
            capturedImages.push(imageData);
            imageCount++;
            
            if (noImagesText) noImagesText.style.display = 'none';
            
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'position-relative';
            imgWrapper.innerHTML = `
                <img src="${imageData}" class="card-img-top" alt="Captured ${imageCount}">
                <span class="position-absolute top-0 start-0 bg-dark text-white rounded-pill px-2 py-1 m-1" style="font-size: 0.7rem;">${imageCount}</span>
            `;
            capturedImagesDiv.appendChild(imgWrapper);
            
            checkFormCompletion();
        }

        function checkFormCompletion() {
            if (capturedImages.length >= 3 && rfidUidInput.value) {
                enrollBtn.disabled = false;
            }
        }
        
        // Form submission
        document.getElementById('enrollmentForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userName = document.getElementById('userName').value.trim();
            const rfidUid = rfidUidInput.value.trim();
            
            if (!userName || !rfidUid || capturedImages.length < 3) {
                showStatus('Please complete all fields and capture images.', 'danger');
                return;
            }
            
            enrollBtn.disabled = true;
            enrollBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Enrolling...';
            showStatus('Processing encodings... Please wait.', 'info');
            
            try {
                const response = await fetch('/enroll', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: userName,
                        rfid_uid: rfidUid,
                        images: capturedImages
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus(result.message + ' Redirecting...', 'success');
                    setTimeout(() => { window.location.href = "/"; }, 2000);
                } else {
                    showStatus(result.message, 'danger');
                    enrollBtn.disabled = false;
                }
            } catch (err) {
                showStatus('Error: ' + err.message, 'danger');
                enrollBtn.disabled = false;
            } finally {
                enrollBtn.innerHTML = 'Enroll User';
            }
        });
        
        function showStatus(message, type) {
            statusDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
        }
    });
</script>

</body>
</html>
