{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="text-center mb-4">📝 Enroll New User</h2>
        
        <div class="card">
            <div class="card-body">
                <form id="enrollmentForm">
                    <div class="mb-3">
                        <label for="userName" class="form-label">User Name</label>
                        <input type="text" class="form-control" id="userName" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Face Images</label>
                        <div class="camera-container">
                            <video id="video" width="640" height="480" autoplay></video>
                            <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
                        </div>
                        <div class="mt-2">
                            <button type="button" class="btn btn-primary" id="startCamera">Start Camera</button>
                            <button type="button" class="btn btn-success" id="capture" disabled>Capture Image</button>
                            <button type="button" class="btn btn-warning" id="captureMultiple">Capture 5 Images</button>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Captured Images</label>
                        <div id="capturedImages" class="row"></div>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" disabled>Enroll User</button>
                    </div>
                </form>
                
                <div id="status" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/enroll.js') }}"></script>
{% endblock %}
