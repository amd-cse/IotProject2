{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="text-center mb-4">🔍 Authenticate User</h2>
        
        <div class="card">
            <div class="card-body">
                <form id="authForm">
                    <div class="mb-3">
                        <label class="form-label">Live Camera Feed</label>
                        <div class="camera-container">
                            <video id="video" width="640" height="480" autoplay></video>
                            <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
                            <div id="overlay" class="overlay-text"></div>
                        </div>
                        <div class="mt-2">
                            <button type="button" class="btn btn-primary" id="startCamera">Start Camera</button>
                            <button type="button" class="btn btn-success" id="startAuth" disabled>Start Authentication</button>
                        </div>
                    </div>
                    
                    <!-- Liveness Challenge Prompt -->
                    <div id="challengePrompt" class="alert alert-info text-center" style="display: none; font-size: 1.2rem; font-weight: bold;">
                        Please wait...
                    </div>

                    <div id="result" class="mt-3"></div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .camera-container { position: relative; }
    .overlay-text {
        position: absolute; top: 20px; left: 0; right: 0; 
        text-align: center; color: white; font-size: 2rem; 
        font-weight: bold; text-shadow: 2px 2px 4px black;
        display: none;
    }
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/authenticate.js') }}"></script>
{% endblock %}
