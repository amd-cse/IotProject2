<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="brand"
            style="font-size: 1.35rem; font-weight: 700; text-decoration: none; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem;">
            <svg fill="none" stroke="var(--primary)" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                </path>
            </svg>
            Face Recognition
        </a>

        <div class="nav-links">
            <a href="{{ url_for('enroll') }}"
                style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem; transition: 0.3s;">Enroll</a>
            <a href="{{ url_for('authenticate') }}"
                style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem; transition: 0.3s;">Authenticate</a>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline"
                style="padding: 0.5rem 1rem; border-radius: 0.5rem; text-decoration: none; font-size: 0.85rem;">
                Admin Dashboard
            </a>
        </div>
    </nav>


    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
